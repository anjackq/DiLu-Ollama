############ Large language model config ############
OPENAI_API_TYPE: 'gemini' # 'openai' or 'azure' or 'ollama' or 'gemini'

# OpenAI settings
OPENAI_KEY: 'ollama'
OPENAI_CHAT_MODEL: null
OPENAI_REFLECTION_MODEL: null

# Azure OpenAI settings
AZURE_API_BASE: # https://xxxxxxx.openai.azure.com/
AZURE_API_VERSION: "2023-07-01-preview"
AZURE_API_KEY: #'xxxxxxx'
AZURE_CHAT_DEPLOY_NAME: # chat model deployment name
AZURE_EMBED_DEPLOY_NAME: # text embed model deployment name

############# Gemini API settings ###############
GEMINI_API_KEY: '' # AI Studio key
GEMINI_CHAT_MODEL: 'gemini-2.0-flash'
GEMINI_REFLECTION_MODEL: null

############# Local model / Ollama config ###############
OLLAMA_API_BASE: 'http://localhost:11434/v1'
OLLAMA_CHAT_MODEL: 'deepseek-r1:14b'
OLLAMA_REFLECTION_MODEL: 'deepseek-r1:14b'
OLLAMA_EMBED_MODEL: 'qwen3-embedding:8b'
OLLAMA_API_KEY: 'ollama'
# Driver agent reasoning switch for native Ollama chat.
# Allowed: auto | think | no_think
OLLAMA_THINK_MODE: 'auto'
# Use native Ollama /api/chat for driver decisions (supports think switch).
OLLAMA_USE_NATIVE_CHAT: true
# Optional timeout for native /api/chat requests (seconds).
OLLAMA_NATIVE_CHAT_TIMEOUT_SEC: 60

############### DiLu settings ############
reflection_module: True # True or False
reflection_interactive: True # If False, disable Y/N terminal prompts in reflection flow
reflection_auto_add: False # If True, auto-commit reflection memories without prompts
reflection_add_every_n: 5 # In non-collision runs, add one memory every N frames (uses i % N == 1)
few_shot_num: 3 # 0 or 1 recommended for smaller local models
episodes_num: 3
memory_path: 'memories/qwen3_embed_8b'

# Structured results layout (recommended default)
results_root: 'results/experiments'
experiment_id: null # null -> auto timestamped experiment id
run_id: null # null -> auto run_<timestamp>

# Legacy direct output override (optional)
result_folder_override: null
result_folder: 'results/deepseek-r1_14b' # backward-compat fallback when results_root is unset

############ Highway-env config ############
simulation_duration: 20
vehicle_count: 15
other_vehicle_type: "highway_env.vehicle.behavior.IDMVehicle"
vehicles_density: 2.0

# Global simulation environment resolver (used by RL + LLM runtime/eval + collection).
sim_env_id: "highway-fast-v0"
sim_use_native_env_defaults: true

# Deprecated aliases (transition only; lower precedence than sim_* keys).
rl_env_id: "highway-fast-v0"
rl_use_native_env_defaults: true

############ Evaluation metrics defaults ############
metrics_ttc_threshold_sec: 2.0
metrics_headway_threshold_m: 15.0
metrics_flapping_mode: "accel_decel"

############ Evaluation runtime guardrails ############
# Quiet mode controls (step logs only):
# - quiet_mode: global default
# - eval_quiet_mode/runtime_quiet_mode: mode-specific override (null -> inherit global)
quiet_mode: false
eval_quiet_mode: null
runtime_quiet_mode: null

# Progress bar controls:
# - progress_bar: global default
# - eval_progress_bar/runtime_progress_bar: mode-specific override (null -> inherit global)
progress_bar: true
eval_progress_bar: null
runtime_progress_bar: null
# Reply preview while progress bars are active.
# Allowed: off | compact | full
progress_reply_mode: off
eval_progress_reply_mode: null
runtime_progress_reply_mode: null

eval_decision_timeout_sec: 60
eval_decision_max_output_tokens: 512 # Runtime output control (not policy-managed)
eval_disable_streaming: true # Runtime output control (not policy-managed)
eval_disable_checker_llm: true # Runtime output control (not policy-managed)
eval_slow_decision_threshold_sec: 5.0
runtime_slow_decision_threshold_sec: 5.0
eval_save_run_artifacts: false
eval_run_id: null # null -> auto eval_run_<timestamp> when artifact capture is enabled

############ Adaptive timeout-halving penalty (decision timeout only) ############
# This penalty only changes decision timeout and does not change output behavior controls.
adaptive_timeout_penalty_enabled: true
adaptive_timeout_halving_factor: 0.5
adaptive_timeout_min_sec: 4.0
adaptive_timeout_trigger_consecutive_slow: 2

# Optional shared model-aware timeout overrides (used by both evaluate_models_ollama.py and run_dilu_ollama.py).
# Timeout-only policy mode:
# - Only `decision_timeout_sec` is honored in policy overrides.
# - Output-affecting policy fields are ignored with warnings.
# Precedence: CLI timeout override > model_policy_overrides > eval_model_overrides (eval only) > defaults.
# Matching: exact model name first, then wildcard/prefix entries.
model_policy_use_builtin_presets: false # Deprecated in timeout-only mode (ignored)
model_policy_overrides:
  # Timeout-only examples.
  'gemini*pro*':
    decision_timeout_sec: 45
  'gemini*flash*':
    decision_timeout_sec: 35
  'qwen3.5:0.8b':
    decision_timeout_sec: 8
  'qwen3.5:2b':
    decision_timeout_sec: 10

# Legacy eval-only per-model overrides (kept for backward compatibility).
# Timeout-only policy mode:
# - only `decision_timeout_sec` is honored.
# - all other policy fields are deprecated and ignored with warnings.
# Matching: exact model name first, then wildcard/prefix entries.
eval_model_overrides:
  'qwen3.5:0.8b':
    decision_timeout_sec: 8
  'qwen3.5:2b':
    decision_timeout_sec: 10
